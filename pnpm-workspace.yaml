# chromatrix pnpm workspace. Follows the mini/gtm conventions: packages/ + apps/ with `workspace:*`
# deps SYMLINKED (linkWorkspacePackages), and each publishable package exposes a `@chromatrix/source`
# export condition so apps resolve straight to TS source (packages/*/src) in dev with no build step.
# Packages build to build/ via tsdown only on prepack/CI (never in dev). Turbo orchestrates the graph.
packages:
  - packages/*
  - apps/*
linkWorkspacePackages: true

# Postinstall build scripts: true = run (native/compile steps), false = explicitly declined.
allowBuilds:
  esbuild: true
  '@swc/core': true
  # Telemetry phone-home pulled in transitively by NestJS deps — declined.
  '@scarf/scarf': false

minimumReleaseAgeExclude:
  - '@silkweave/auth@4.4.0'
  - '@silkweave/core@4.4.0'
  - '@silkweave/mcp@4.4.0'
  - '@silkweave/nestjs@4.4.0'
  - '@silkweave/trpc@4.4.0'
  - '@silkweave/typegen@4.4.0'
