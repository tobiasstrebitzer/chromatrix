<svg width="1280" height="600" viewBox="0 0 1280 600" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <!-- chromatrix banner: the achromatic dashboard, simplified. One real Chrome per identity, tabs leased to
       agents, one panel in human takeover. Colour is reserved for state (green = live), exactly as the product. -->
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1280" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a2a2a" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#2a2a2a" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="thumb"><rect x="0" y="0" width="196" height="112" rx="7"/></clipPath>
  </defs>

  <rect width="1280" height="600" fill="url(#canvas)"/>
  <circle cx="1050" cy="90" r="300" fill="#ffffff" opacity="0.02"/>
  <circle cx="180" cy="540" r="260" fill="#3ecf8e" opacity="0.03"/>

  <!-- ===================== left: identity + pitch ===================== -->
  <g transform="translate(96, 150)">
    <!-- logo mark: 3x3 grid, leading diagonal lit -->
    <g>
      <rect x="0" y="0" width="15" height="15" rx="3.5" fill="#ffffff"/>
      <rect x="21" y="0" width="15" height="15" rx="3.5" fill="#ffffff" opacity="0.24"/>
      <rect x="42" y="0" width="15" height="15" rx="3.5" fill="#ffffff" opacity="0.24"/>
      <rect x="0" y="21" width="15" height="15" rx="3.5" fill="#ffffff" opacity="0.24"/>
      <rect x="21" y="21" width="15" height="15" rx="3.5" fill="#ffffff"/>
      <rect x="42" y="21" width="15" height="15" rx="3.5" fill="#ffffff" opacity="0.24"/>
      <rect x="0" y="42" width="15" height="15" rx="3.5" fill="#ffffff" opacity="0.24"/>
      <rect x="21" y="42" width="15" height="15" rx="3.5" fill="#ffffff" opacity="0.24"/>
      <rect x="42" y="42" width="15" height="15" rx="3.5" fill="#ffffff"/>
    </g>

    <text x="0" y="130" font-size="66" font-weight="700" fill="#ededed" letter-spacing="-2">chromatrix</text>
    <text x="2" y="178" font-size="22" font-weight="500" fill="#a1a1a1">Real Chrome, orchestrated.</text>

    <!-- pitch lines -->
    <g font-size="16.5" fill="#8f8f8f">
      <circle cx="6" cy="234" r="3" fill="#ffffff"/>
      <text x="22" y="240">One long-lived <tspan fill="#ededed" font-style="italic">real</tspan> Chrome per identity</text>
      <circle cx="6" cy="270" r="3" fill="#ffffff"/>
      <text x="22" y="276">Concurrent tabs over a mitigating CDP gateway</text>
      <circle cx="6" cy="306" r="3" fill="#3ecf8e"/>
      <text x="22" y="312">Live view + human takeover</text>
    </g>

    <!-- command chip -->
    <g transform="translate(0, 344)">
      <rect x="0" y="0" width="392" height="40" rx="9" fill="#111111" stroke="#262626"/>
      <text x="16" y="26" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14.5" fill="#c9c9c9"><tspan fill="#5a5a5a">$</tspan> npx @chromatrix/gateway</text>
    </g>
  </g>

  <!-- ===================== right: dashboard mockup ===================== -->
  <g transform="translate(660, 74)" filter="url(#soft)">
    <!-- framed shell -->
    <rect x="0" y="0" width="540" height="452" rx="16" fill="#0a0a0a" stroke="#1f1f1f"/>
    <rect x="0" y="0" width="540" height="1.5" rx="1" fill="url(#sheen)"/>

    <!-- title bar -->
    <g>
      <circle cx="24" cy="26" r="5" fill="#333333"/>
      <circle cx="42" cy="26" r="5" fill="#333333"/>
      <circle cx="60" cy="26" r="5" fill="#333333"/>
      <text x="90" y="31" font-size="13" font-weight="600" fill="#8f8f8f">Sessions</text>
      <!-- token pill -->
      <rect x="430" y="15" width="94" height="24" rx="12" fill="#141414" stroke="#262626"/>
      <circle cx="446" cy="27" r="4" fill="#3ecf8e"/>
      <text x="457" y="31" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#8f8f8f">connected</text>
    </g>
    <line x1="0" y1="52" x2="540" y2="52" stroke="#1f1f1f"/>

    <!-- identity row: work-twitter (running) -->
    <g transform="translate(24, 72)">
      <circle cx="6" cy="8" r="5" fill="#3ecf8e"/>
      <text x="20" y="13" font-size="15" font-weight="600" fill="#ededed">work-twitter</text>
      <text x="128" y="13" font-family="ui-monospace, Menlo, monospace" font-size="11.5" fill="#6e6e6e">running · 2 tabs</text>

      <!-- tab thumbnails -->
      <g transform="translate(0, 26)">
        <g clip-path="url(#thumb)">
          <rect width="196" height="112" fill="#141414"/>
          <rect width="196" height="26" fill="#0d0d0d"/>
          <rect x="10" y="9" width="120" height="8" rx="4" fill="#2a2a2a"/>
          <rect x="14" y="44" width="150" height="9" rx="4" fill="#3a3a3a"/>
          <rect x="14" y="62" width="120" height="7" rx="3.5" fill="#262626"/>
          <rect x="14" y="78" width="140" height="7" rx="3.5" fill="#262626"/>
        </g>
        <rect x="0.5" y="0.5" width="195" height="111" rx="7" fill="none" stroke="#242424"/>
        <text x="6" y="130" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#6e6e6e">agent: scout</text>
      </g>
      <g transform="translate(212, 26)">
        <g clip-path="url(#thumb)">
          <rect width="196" height="112" fill="#141414"/>
          <rect width="196" height="26" fill="#0d0d0d"/>
          <rect x="10" y="9" width="96" height="8" rx="4" fill="#2a2a2a"/>
          <rect x="14" y="44" width="130" height="9" rx="4" fill="#3a3a3a"/>
          <rect x="14" y="62" width="160" height="7" rx="3.5" fill="#262626"/>
          <rect x="14" y="78" width="90" height="7" rx="3.5" fill="#262626"/>
        </g>
        <rect x="0.5" y="0.5" width="195" height="111" rx="7" fill="none" stroke="#242424"/>
        <text x="6" y="130" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#6e6e6e">agent: writer</text>
      </g>
    </g>

    <!-- identity row: research (takeover / live) -->
    <g transform="translate(24, 268)">
      <circle cx="6" cy="8" r="5" fill="#3ecf8e"/>
      <text x="20" y="13" font-size="15" font-weight="600" fill="#ededed">research</text>
      <!-- LIVE takeover badge -->
      <rect x="96" y="0" width="70" height="17" rx="8.5" fill="#0d2a1d"/>
      <circle cx="108" cy="8.5" r="3.5" fill="#3ecf8e"/>
      <text x="118" y="12.5" font-size="10.5" font-weight="700" fill="#3ecf8e" letter-spacing="0.5">TAKEOVER</text>

      <g transform="translate(0, 26)">
        <!-- takeover stage: a wider live panel with a cursor -->
        <g clip-path="url(#thumb2)">
          <rect width="408" height="112" fill="#0f0f0f"/>
          <rect width="408" height="28" fill="#0d0d0d"/>
          <rect x="12" y="10" width="220" height="8" rx="4" fill="#2a2a2a"/>
          <rect x="24" y="48" width="200" height="10" rx="5" fill="#3a3a3a"/>
          <rect x="24" y="70" width="300" height="8" rx="4" fill="#242424"/>
          <rect x="24" y="88" width="150" height="8" rx="4" fill="#242424"/>
          <!-- login form hint -->
          <rect x="300" y="44" width="84" height="20" rx="5" fill="#161616" stroke="#2e2e2e"/>
          <rect x="300" y="72" width="84" height="20" rx="5" fill="#161616" stroke="#3ecf8e" stroke-opacity="0.5"/>
          <!-- isTrusted cursor -->
          <path d="M336 78 L336 98 L341 93 L345 101 L348 100 L344 92 L351 92 Z" fill="#ffffff" stroke="#000000" stroke-width="0.8"/>
        </g>
        <rect x="0.5" y="0.5" width="407" height="111" rx="7" fill="none" stroke="#2a3a30"/>
        <clipPath id="thumb2"><rect width="408" height="112" rx="7"/></clipPath>
        <text x="6" y="130" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#6e6e6e">human driving · input is <tspan fill="#3ecf8e">isTrusted</tspan></text>
      </g>
    </g>
  </g>
</svg>
